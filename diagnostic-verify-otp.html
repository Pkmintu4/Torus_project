<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnostic Center – Verify OTP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --text-white: #FFFFFF;
            --text-muted: #94A3B8;
            --cyan-neon: #22D3EE;
            --cyan-gradient-start: #06b6d4;
            --cyan-gradient-end: #0891b2;
            --card-bg: rgba(15, 23, 42, 0.6);
            --card-border: rgba(255, 255, 255, 0.08);
            --input-bg: rgba(15, 23, 42, 0.8);
            --input-border: rgba(255, 255, 255, 0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body { width: 100%; height: 100%; min-height: 100vh; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #050816;
            background-image: radial-gradient(circle at top, #001a33 0%, #050816 60%, #02030a 100%);
            background-size: cover;
            background-attachment: fixed;
            color: var(--text-white);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            min-height: 100vh;
            padding: 1.25em;
            -webkit-font-smoothing: antialiased;
        }

        body::before {
            content: '';
            position: absolute;
            top: -9.375em;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 75em;
            height: 37.5em;
            background: radial-gradient(circle, rgba(34, 211, 238, 0.15) 0%, transparent 70%);
            filter: blur(3.75em);
            z-index: -1;
            pointer-events: none;
        }

        .top-back-btn {
            position: fixed;
            top: 1.25em;
            right: 1.25em;
            background: rgba(255, 255, 255, 0.03);
            border: 0.0625em solid var(--input-border);
            color: var(--text-muted);
            border-radius: 999px;
            width: 7.5em;
            height: 3.59em;
            padding: 0;
            font-family: 'Inter', sans-serif;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            z-index: 30;
            box-shadow: 0 0 0.9em rgba(34, 211, 238, 0.12);
            transition: all 0.25s ease;
        }

        .top-back-btn:hover {
            color: var(--text-white);
            border-color: rgba(34, 211, 238, 0.45);
            background: rgba(34, 211, 238, 0.08);
            box-shadow: 0 0 1.05em rgba(34, 211, 238, 0.25);
            transform: translateY(-0.0625em);
        }

        .container {
            width: 100%;
            max-width: 32.5em;
            padding: 3.75em 1.25em;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .header {
            text-align: center;
            margin-bottom: 2em;
            gap: 0.5em;
            display: flex;
            flex-direction: column;
        }

        .main-title { font-size: 2.5em; font-weight: 700; color: #ffffff; }
        .subtitle { font-size: 0.9375em; color: var(--text-muted); }

        .card {
            width: 100%;
            background: var(--card-bg);
            border: 0.0625em solid var(--card-border);
            border-radius: 1em;
            padding: 2em;
            backdrop-filter: blur(0.5em);
            box-shadow: 0 0.5em 2em rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
        }

        .form-group { display: flex; flex-direction: column; gap: 0.5em; margin-bottom: 1.5em; }
        .form-group label { font-size: 0.8125em; font-weight: 500; color: var(--text-muted); }

        .input-wrapper { position: relative; display: flex; align-items: center; justify-content: center; }
        .input-wrapper svg { position: absolute; left: 0.875em; width: 1.125em; height: 1.125em; fill: none; stroke: var(--text-muted); stroke-width: 2; }

        .form-control {
            width: 100%;
            background: var(--input-bg);
            border: 0.0625em solid var(--input-border);
            border-radius: 0.875em;
            padding: 1.125em 1em 1.125em 3.125em;
            font-family: 'Inter';
            font-size: 1.125em;
            letter-spacing: 0.5em;
            color: var(--text-white);
            outline: none;
            transition: all 0.3s ease;
            text-align: center;
        }

        .form-control:focus {
            border-color: var(--cyan-neon);
            box-shadow: 0 0 0 0.125em rgba(34, 211, 238, 0.2);
        }

        .btn {
            width: 100%;
            padding: 1em;
            border: none;
            border-radius: 0.75em;
            font-family: 'Inter', sans-serif;
            font-size: 1.0625em;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-primary {
            background: linear-gradient(90deg, var(--cyan-gradient-start), var(--cyan-gradient-end));
            margin-bottom: 1em;
            box-shadow: 0 0.25em 0.9375em rgba(6, 182, 212, 0.3);
        }

        .btn-primary:hover:not(:disabled) {
            box-shadow: 0 0.375em 1.25em rgba(6, 182, 212, 0.55);
            filter: brightness(1.07);
            transform: translateY(-0.0625em);
        }

        .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; }

        .alert {
            padding: 0.75em;
            border-radius: 0.5em;
            font-size: 0.8125em;
            text-align: center;
            display: none;
            margin-bottom: 1.25em;
        }
        .alert-error { color: #EF4444; background: rgba(239, 68, 68, 0.1); border: 0.0625em solid rgba(239, 68, 68, 0.2); }
        .alert-success { color: #10B981; background: rgba(16, 185, 129, 0.1); border: 0.0625em solid rgba(16, 185, 129, 0.2); }

        @media (max-width: 37.5em) {
            .main-title { font-size: 1.875em; }
            .top-back-btn { top: 1em; right: 1em; width: 5em; height: 2.2em; font-size: 0.95em; }
        }
    </style>
</head>
<body>
    <button type="button" class="top-back-btn" id="topBackBtn" aria-label="Go back">Back</button>

    <div class="container">
        <div class="header">
            <h1 class="main-title">Verify OTP</h1>
            <p class="subtitle">Enter the 6-digit code sent to your email</p>
        </div>

        <div class="card">
            <div id="alertBox" class="alert"></div>

            <form id="verifyForm">
                <div class="form-group">
                    <label>6-Digit OTP</label>
                    <div class="input-wrapper">
                        <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                        <input type="text" class="form-control" id="otp" placeholder="123456" maxlength="6" inputmode="numeric" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" id="submitBtn">Verify OTP</button>
            </form>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:5000';
        const urlParams = new URLSearchParams(window.location.search);

        document.getElementById('topBackBtn').addEventListener('click', () => {
            window.location.href = 'diagnostic-forgot-password.html';
        });

        document.getElementById('verifyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const alertBox = document.getElementById('alertBox');
            const otp = document.getElementById('otp').value.trim();
            const email = urlParams.get('email');

            if (!email) {
                alertBox.innerText = 'Email not found in URL. Go back and request OTP again.';
                alertBox.className = 'alert alert-error';
                alertBox.style.display = 'block';
                return;
            }

            alertBox.style.display = 'none';
            btn.innerHTML = 'Verifying...';
            btn.disabled = true;

            try {
                const res = await fetch(`${API_BASE_URL}/api/auth/verify-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp })
                });

                const data = await res.json();

                if (res.ok) {
                    alertBox.innerText = data.message || 'OTP verified! Redirecting to password reset...';
                    alertBox.className = 'alert alert-success';
                    alertBox.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = `diagnostic-reset-password.html?email=${encodeURIComponent(email)}&otp=${encodeURIComponent(otp)}`;
                    }, 1000);
                } else {
                    alertBox.innerText = data.message || data.msg || 'Invalid or expired OTP';
                    alertBox.className = 'alert alert-error';
                    alertBox.style.display = 'block';
                }
            } catch (err) {
                if (err instanceof TypeError && err.message.toLowerCase().includes('fetch')) {
                    alertBox.innerText = 'Unable to connect. Please check your connection or contact support.';
                } else {
                    alertBox.innerText = 'Something went wrong. Please try again.';
                }
                alertBox.className = 'alert alert-error';
                alertBox.style.display = 'block';
            } finally {
                btn.innerHTML = 'Verify OTP';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
