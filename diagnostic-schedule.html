<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TORUS - Schedule Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="styles.css" />
  
  <style>
    /* Premium Background Ambient Glow */
    body.dashboard-page {
      background-color: #02040a !important;
      background-image: none !important;
      color: #fff;
      font-family: 'Inter', sans-serif;
      margin: 0;
      overflow-x: hidden;
    }

    .dashboard-page::before,
    .dashboard-page::after {
      content: '';
      position: fixed;
      width: 800px;
      height: 800px;
      border-radius: 50%;
      filter: blur(150px);
      z-index: -1;
      pointer-events: none;
      opacity: 0.35;
    }

    .dashboard-page::before {
      top: -20%; left: 10%;
      background: radial-gradient(circle, #00C8FF 0%, transparent 60%);
    }

    .dashboard-page::after {
      bottom: -20%; right: 10%;
      background: radial-gradient(circle, #8A2EFF 0%, transparent 60%);
    }

    /* Layout */
    .dashboard-shell {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow-y: auto;
      padding: 2em 3em;
    }

    /* Top Controls */
    .schedule-controls-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2em;
    }
    
    .smart-search {
      position: relative;
      width: 400px;
    }
    .smart-search i {
      position: absolute;
      left: 1em;
      top: 50%;
      transform: translateY(-50%);
      color: #00E5FF;
    }
    .smart-search input {
      width: 100%;
      background: rgba(12, 18, 33, 0.6);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      padding: 0.8em 1em 0.8em 3em;
      color: #fff;
      font-family: inherit;
      transition: all 0.3s ease;
    }
    .smart-search input:focus {
      outline: none;
      border-color: #00E5FF;
      box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
    }

    .filter-pills {
      display: flex;
      gap: 0.5em;
    }
    .filter-pill {
      background: rgba(12, 18, 33, 0.6);
      border: 1px solid rgba(255,255,255,0.08);
      color: #94A3B8;
      padding: 0.6em 1.2em;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.9em;
    }
    .filter-pill.active, .filter-pill:hover {
      background: rgba(0, 229, 255, 0.1);
      border-color: #00E5FF;
      color: #00E5FF;
    }

    /* Core Panels */
    .panel-card {
      background: rgba(12, 18, 33, 0.6);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 1.5em 2em;
      margin-bottom: 2em;
      flex-grow: 1;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5em;
    }

    .panel-header h3 {
      margin: 0;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 0.5em;
      font-size: 1.2em;
    }

    /* Table */
    .schedule-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }
    .schedule-table th {
      padding: 1em;
      color: #94A3B8;
      font-weight: 500;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .schedule-table td {
      padding: 1.2em 1em;
      border-bottom: 1px solid rgba(255,255,255,0.02);
      vertical-align: middle;
    }
    .schedule-table tr:hover td {
      background: rgba(255,255,255,0.02);
    }
    .status-badge {
      padding: 0.4em 0.8em;
      border-radius: 4px;
      font-size: 0.85em;
      font-weight: 600;
    }
    .status-badge.scheduled, .status-badge.upcoming { background: rgba(0, 229, 255, 0.1); color: #00E5FF; border: 1px solid rgba(0, 229, 255, 0.2); }
    .status-badge.completed { background: rgba(0, 255, 153, 0.1); color: #00FF99; border: 1px solid rgba(0, 255, 153, 0.2); }
    .status-badge.cancelled { background: rgba(255, 69, 69, 0.1); color: #ff4545; border: 1px solid rgba(255, 69, 69, 0.2); }
    
    .action-group {
      display: flex;
      gap: 0.5em;
      justify-content: flex-end;
    }
    
    .action-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      padding: 0.6em 1.2em;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85em;
      font-weight: 500;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 0.5em;
    }
    .action-btn:hover {
      background: rgba(138, 46, 255, 0.1);
      border-color: #8A2EFF;
      color: #8A2EFF;
      box-shadow: 0 0 15px rgba(138, 46, 255, 0.3);
    }
    
    .action-btn.reschedule-btn:hover {
      background: rgba(0, 229, 255, 0.1);
      border-color: #00E5FF;
      color: #00E5FF;
      box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
    }

    .action-btn.cancel-btn:hover {
      background: rgba(255, 69, 69, 0.1);
      border-color: #ff4545;
      color: #ff4545;
      box-shadow: 0 0 15px rgba(255, 69, 69, 0.3);
    }

    /* Modals & Drawers */
    .drawer-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
      z-index: 2000; opacity: 0; pointer-events: none; transition: 0.3s;
    }
    .drawer-overlay.active { opacity: 1; pointer-events: all; }
    
    .details-drawer {
      position: fixed; top: 0; right: -500px; width: 450px; height: 100vh;
      background: linear-gradient(145deg, rgba(12, 18, 33, 0.98), rgba(5, 8, 15, 1));
      border-left: 1px solid rgba(255,255,255,0.1);
      z-index: 2001; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1);
      padding: 2.5em 2em; box-shadow: -10px 0 30px rgba(0,0,0,0.5);
      overflow-y: auto;
    }
    .details-drawer.active { right: 0; }
    
    .drawer-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 2.5em; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 1em;
    }
    .drawer-close { background: none; border: none; color: #94A3B8; cursor: pointer; }
    .drawer-close:hover { color: #fff; }
    
    .drawer-section { margin-bottom: 2em; }
    .drawer-section h4 { color: #8A2EFF; margin: 0 0 1em 0; font-size: 0.9em; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 0.5em; }
    .drawer-kv { display: flex; justify-content: space-between; margin-bottom: 0.8em; }
    .drawer-k { color: #94A3B8; font-size: 0.95em; }
    .drawer-v { color: #fff; font-weight: 500; font-size: 0.95em; text-align: right;}

    /* Simple Reschedule Modal */
    .reschedule-modal {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -60%);
      background: #111827; border: 1px solid rgba(0, 229, 255, 0.5);
      padding: 2.5em; border-radius: 12px; width: 400px;
      z-index: 2002; opacity: 0; pointer-events: none; transition: 0.3s;
      box-shadow: 0 10px 40px rgba(0,0,0,0.8);
    }
    .reschedule-modal.active { opacity: 1; pointer-events: all; transform: translate(-50%, -50%); }

    /* Cancel Modal */
    .cancel-modal {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -60%);
      background: #111827; border: 1px solid rgba(255, 69, 69, 0.5);
      padding: 2.5em; border-radius: 12px; width: 420px; text-align: center;
      z-index: 2002; opacity: 0; pointer-events: none; transition: 0.3s;
      box-shadow: 0 10px 40px rgba(0,0,0,0.8);
    }
    .cancel-modal.active { opacity: 1; pointer-events: all; transform: translate(-50%, -50%); }
    .form-group { margin-bottom: 1.5em; }
    .form-group label { display: block; color: #94A3B8; margin-bottom: 0.6em; font-size: 0.9em; }
    .form-group input { 
      width: 100%; background: #02040a; border: 1px solid rgba(255, 255, 255, 0.1); 
      color: #fff; padding: 1em; border-radius: 8px; font-family: inherit; 
    }
    .submit-btn {
      width: 100%; background: #00E5FF; color: #000; font-weight: 600; border: none;
      padding: 1.2em; border-radius: 8px; cursor: pointer; margin-top: 1em;
    }
    
    .back-btn {
      display: inline-flex; align-items: center; gap: 0.5em;
      color: #94A3B8; text-decoration: none; font-size: 0.9em;
      margin-bottom: 1.5em; transition: 0.2s; background: none; border: none; cursor: pointer;
    }
    .back-btn:hover { color: #00E5FF; }

  </style>
</head>

<body class="dashboard-page">

  <!-- Main Shell -->
  <div class="dashboard-shell">
    
    <button class="back-btn" onclick="window.location.href='diagnostic-dashboard.html'">
      <i data-lucide="arrow-left" style="width:16px;height:16px"></i> Back to Dashboard
    </button>

    <!-- Controls Row (Search & Filters) -->
    <div class="schedule-controls-row">
      <div class="filter-pills" id="filterPills">
        <div class="filter-pill active" data-filter="All">All</div>
        <div class="filter-pill" data-filter="Today">Today</div>
        <div class="filter-pill" data-filter="Upcoming">Upcoming</div>
        <div class="filter-pill" data-filter="Completed">Completed</div>
        <div class="filter-pill" data-filter="Cancelled">Cancelled</div>
      </div>
      <div class="smart-search">
        <i data-lucide="search"></i>
        <input type="text" id="searchInput" placeholder="Search Patient Name, ID, Doctor..." />
      </div>
    </div>

    <!-- Scans Table -->
    <div class="panel-card">
      <div class="panel-header">
        <h3><i data-lucide="list" style="color:#00E5FF"></i> Scheduled Scans</h3>
      </div>
      <div style="overflow-x:auto;">
        <table class="schedule-table">
          <thead>
            <tr>
              <th>Schedule ID</th>
              <th>Patient</th>
              <th>Scan Type</th>
              <th>Doctor</th>
              <th>Date & Time</th>
              <th>Status</th>
              <th style="text-align: right;">Actions</th>
            </tr>
          </thead>
          <tbody id="scheduleTableBody">
            <tr><td colspan="7" style="text-align:center; padding:3em; color:#94A3B8;">No Scheduled Scans Available</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <!-- Schedule Details Drawer -->
  <div class="drawer-overlay" id="drawerOverlay"></div>
  <div class="details-drawer" id="detailsDrawer">
    <div class="drawer-header">
      <h2 style="margin:0; color:#fff; font-size:1.5em; display:flex; align-items:center; gap:0.5em;"><i data-lucide="info" style="color:#00E5FF"></i> Appointment Details</h2>
      <button class="drawer-close" onclick="closeDrawer()"><i data-lucide="x"></i></button>
    </div>
    <div class="drawer-content" id="drawerContent"></div>
  </div>

  <!-- Reschedule Modal -->
  <div class="reschedule-modal" id="rescheduleModal">
    <h3 style="margin:0 0 1.5em 0; color:#fff;">Reschedule Appointment</h3>
    <input type="hidden" id="rescheduleId" />
    <div class="form-group">
      <label>New Date (DD-MM-YYYY)</label>
      <input type="text" id="rescheduleDate" placeholder="e.g. 24-03-2026" />
    </div>
    <div class="form-group">
      <label>New Time (e.g. 10:30 AM)</label>
      <input type="text" id="rescheduleTime" placeholder="e.g. 10:30 AM" />
    </div>
    <div style="display:flex; gap:1em;">
      <button class="submit-btn" style="background:transparent; border:1px solid rgba(255,255,255,0.2); color:#fff;" onclick="closeRescheduleModal()">Cancel</button>
      <button class="submit-btn" onclick="submitReschedule()">Confirm</button>
    </div>
  </div>

  <!-- Cancel Modal -->
  <div class="cancel-modal" id="cancelModal">
    <div style="margin-bottom: 1.5em; display: flex; justify-content: center;">
      <i data-lucide="alert-triangle" style="width:48px;height:48px;color:#ff4545;"></i>
    </div>
    <h3 style="margin:0 0 0.5em 0; color:#fff;">Cancel Schedule</h3>
    <p style="color:#94A3B8; margin-bottom: 2em; line-height: 1.5;" id="cancelModalText"></p>
    <div style="display: flex; gap: 1em; justify-content: center;">
      <button class="submit-btn" style="background: rgba(255, 69, 69, 0.1); border: 1px solid #ff4545; color: #ff4545; box-shadow: 0 0 15px rgba(255, 69, 69, 0.2); margin-top:0;" onclick="confirmCancel()">Confirm Cancel</button>
      <button class="submit-btn" style="background:transparent; border:1px solid rgba(255,255,255,0.2); color:#fff; margin-top:0;" onclick="closeCancelModal()">Close</button>
    </div>
  </div>

  <script>
    lucide.createIcons();

    let allSchedules = [];
    let currentFilter = 'All';

    // Ensure past dates are marked as Completed locally
    function checkAutoCompletion(schedule) {
      if (schedule.status === 'Cancelled') return schedule;
      if (schedule.status === 'Completed') return schedule;
      
      try {
        const parts = schedule.appointment_date.split('-');
        if (parts.length === 3) {
          const schDate = new Date(`${parts[2]}-${parts[1]}-${parts[0]}T00:00:00`);
          const now = new Date();
          now.setHours(0,0,0,0);
          
          if (schDate < now) {
            schedule.status = 'Completed';
            // Optionally could fire an API to update DB, but for now just UI
          }
        }
      } catch (e) {}
      return schedule;
    }

    const dummyData = [
      { schedule_id: 'SCH-0001', patient_id: 'TORUS-1011', patient_name: 'Ravi Kumar', scan_type: 'Abdominal Ultrasound', doctor_name: 'Dr. Rajesh', appointment_date: new Date().toLocaleDateString('en-GB').replace(/\//g, '-'), appointment_time: '10:30 AM', status: 'Upcoming' },
      { schedule_id: 'SCH-0002', patient_id: 'TORUS-1022', patient_name: 'Suresh Reddy', scan_type: 'Pelvic Scan', doctor_name: 'Dr. Priya', appointment_date: new Date().toLocaleDateString('en-GB').replace(/\//g, '-'), appointment_time: '11:00 AM', status: 'Upcoming' },
      { schedule_id: 'SCH-0003', patient_id: 'TORUS-1033', patient_name: 'Sai Kiran', scan_type: 'Thyroid Scan', doctor_name: 'Dr. Kumar', appointment_date: new Date().toLocaleDateString('en-GB').replace(/\//g, '-'), appointment_time: '02:00 PM', status: 'Completed' },
      { schedule_id: 'SCH-0004', patient_id: 'TORUS-6762', patient_name: 'Manjula', scan_type: 'Abdominal Ultrasound', doctor_name: 'Dr. Rajesh', appointment_date: new Date(Date.now() + 86400000).toLocaleDateString('en-GB').replace(/\//g, '-'), appointment_time: '09:30 AM', status: 'Upcoming' },
      { schedule_id: 'SCH-0005', patient_id: 'TORUS-1044', patient_name: 'Ramesh', scan_type: 'Cardiac Scan', doctor_name: 'Dr. Priya', appointment_date: new Date(Date.now() + 86400000).toLocaleDateString('en-GB').replace(/\//g, '-'), appointment_time: '11:30 AM', status: 'Cancelled' }
    ];

    async function fetchSchedules() {
      try {
        const res = await fetch('http://127.0.0.1:5002/api/schedules');
        const json = await res.json();
        if (json.data && json.data.length > 0) {
          allSchedules = json.data.map(checkAutoCompletion);
        } else {
          // Fallback to dummy data if DB is empty
          allSchedules = dummyData;
        }
        renderTable();
      } catch (err) {
        console.error("Error fetching schedules, falling back to dummy data", err);
        // Silently handle backend failure by showing dummy data
        allSchedules = dummyData;
        renderTable();
      }
    }

    function renderTable() {
      const tbody = document.getElementById('scheduleTableBody');
      const searchQuery = document.getElementById('searchInput').value.toLowerCase();
      
      const todayDateStr = new Date().toLocaleDateString('en-GB').replace(/\//g, '-'); // DD-MM-YYYY

      const filtered = allSchedules.filter(sch => {
        // Search filter
        const matchesSearch = 
          sch.schedule_id.toLowerCase().includes(searchQuery) ||
          sch.patient_name.toLowerCase().includes(searchQuery) ||
          sch.patient_id.toLowerCase().includes(searchQuery) ||
          sch.doctor_name.toLowerCase().includes(searchQuery);
          
        if (!matchesSearch) return false;

        // Status filter
        if (currentFilter === 'Today') {
          return sch.appointment_date === todayDateStr;
        } else if (currentFilter === 'Upcoming') {
          return sch.status === 'Scheduled' || sch.status === 'Upcoming';
        } else if (currentFilter === 'Completed') {
          return sch.status === 'Completed';
        } else if (currentFilter === 'Cancelled') {
          return sch.status === 'Cancelled';
        }
        
        return true;
      });

      if (filtered.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; padding:3em; color:#94A3B8;">No Scheduled Scans Available</td></tr>`;
        return;
      }

      tbody.innerHTML = '';
      filtered.forEach(sch => {
        let statusClass = sch.status.toLowerCase();
        // Fallback styling for scheduled
        if(statusClass === 'scheduled') statusClass = 'upcoming'; 

        // Action buttons based on status
        let actionsHtml = `<button class="action-btn" onclick="openDrawer('${sch.schedule_id}')"><i data-lucide="eye" style="width:14px;height:14px;"></i> View</button>`;
        
        if (statusClass === 'upcoming') {
          actionsHtml += `
            <button class="action-btn reschedule-btn" onclick="openReschedule('${sch.schedule_id}')"><i data-lucide="calendar-clock" style="width:14px;height:14px;"></i> Reschedule</button>
            <button class="action-btn cancel-btn" onclick="cancelSchedule('${sch.schedule_id}')"><i data-lucide="x-circle" style="width:14px;height:14px;"></i> Cancel</button>
          `;
        }

        let html = `
          <tr>
            <td><strong style="color:#00E5FF; letter-spacing: 0.5px;">${sch.schedule_id}</strong></td>
            <td>
              <div style="color:#fff; font-weight: 500; margin-bottom: 0.2em;">${sch.patient_name}</div>
              <div style="font-size:0.85em;color:#94A3B8">${sch.patient_id}</div>
            </td>
            <td><span style="background: rgba(255,255,255,0.05); padding: 0.3em 0.8em; border-radius: 4px; font-size: 0.9em;">${sch.scan_type}</span></td>
            <td style="color:#e2e8f0;">${sch.doctor_name}</td>
            <td>
              <div style="color:#fff; margin-bottom: 0.2em;">${sch.appointment_date}</div>
              <div style="font-size:0.85em;color:#94A3B8">${sch.appointment_time}</div>
            </td>
            <td><span class="status-badge ${statusClass}">${sch.status}</span></td>
            <td>
              <div class="action-group">
                ${actionsHtml}
              </div>
            </td>
          </tr>
        `;
        tbody.innerHTML += html;
      });
      lucide.createIcons();
    }

    // Filters and Search listeners
    document.getElementById('searchInput').addEventListener('input', renderTable);
    
    document.getElementById('filterPills').addEventListener('click', (e) => {
      if(e.target.classList.contains('filter-pill')) {
        document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
        e.target.classList.add('active');
        currentFilter = e.target.getAttribute('data-filter');
        renderTable();
      }
    });

    // View Drawer
    const drawerOverlay = document.getElementById('drawerOverlay');
    const detailsDrawer = document.getElementById('detailsDrawer');
    const drawerContent = document.getElementById('drawerContent');

    drawerOverlay.addEventListener('click', () => {
      closeDrawer();
      closeRescheduleModal();
      if(typeof closeCancelModal === 'function') closeCancelModal();
    });

    function openDrawer(id) {
      const sch = allSchedules.find(s => s.schedule_id === id);
      if(!sch) return;

      drawerContent.innerHTML = `
        <div class="drawer-section">
          <h4><i data-lucide="user" style="width:16px;height:16px;"></i> Patient Information</h4>
          <div class="drawer-kv"><span class="drawer-k">Name</span><span class="drawer-v">${sch.patient_name}</span></div>
          <div class="drawer-kv"><span class="drawer-k">Patient ID</span><span class="drawer-v" style="color:#00E5FF">${sch.patient_id}</span></div>
        </div>
        <div class="drawer-section">
          <h4><i data-lucide="activity" style="width:16px;height:16px;"></i> Scan Details</h4>
          <div class="drawer-kv"><span class="drawer-k">Schedule ID</span><span class="drawer-v">${sch.schedule_id}</span></div>
          <div class="drawer-kv"><span class="drawer-k">Scan Type</span><span class="drawer-v">${sch.scan_type}</span></div>
        </div>
        <div class="drawer-section">
          <h4><i data-lucide="stethoscope" style="width:16px;height:16px;"></i> Doctor Information</h4>
          <div class="drawer-kv"><span class="drawer-k">Assigned Doctor</span><span class="drawer-v">${sch.doctor_name}</span></div>
        </div>
        <div class="drawer-section">
          <h4><i data-lucide="calendar" style="width:16px;height:16px;"></i> Appointment Details</h4>
          <div class="drawer-kv"><span class="drawer-k">Scheduled Date</span><span class="drawer-v">${sch.appointment_date}</span></div>
          <div class="drawer-kv"><span class="drawer-k">Scheduled Time</span><span class="drawer-v">${sch.appointment_time}</span></div>
        </div>
        <div class="drawer-section" style="border-top: 1px solid rgba(255,255,255,0.05); padding-top: 1.5em; margin-top: 2em;">
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <span style="color:#94A3B8">Schedule Status</span>
            <span class="status-badge ${sch.status.toLowerCase() === 'scheduled' ? 'upcoming' : sch.status.toLowerCase()}" style="font-size:1em;">${sch.status}</span>
          </div>
        </div>
      `;

      lucide.createIcons();
      drawerOverlay.classList.add('active');
      detailsDrawer.classList.add('active');
    }

    function closeDrawer() {
      drawerOverlay.classList.remove('active');
      detailsDrawer.classList.remove('active');
    }

    // Cancel Action
    let currentCancelId = null;
    function cancelSchedule(id) {
      currentCancelId = id;
      document.getElementById('cancelModalText').innerText = `Are you sure you want to cancel schedule ${id}?`;
      drawerOverlay.classList.add('active');
      document.getElementById('cancelModal').classList.add('active');
    }

    function closeCancelModal() {
      drawerOverlay.classList.remove('active');
      document.getElementById('cancelModal').classList.remove('active');
      currentCancelId = null;
    }

    async function confirmCancel() {
      const id = currentCancelId;
      if (!id) return;
      
      // Optimistic UI Update
      const idx = allSchedules.findIndex(s => s.schedule_id === id);
      if (idx > -1) {
        allSchedules[idx].status = 'Cancelled';
      }
      renderTable();
      closeCancelModal();

      try {
        const res = await fetch(`http://127.0.0.1:5002/api/schedule/${id}/status`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status: 'Cancelled' })
        });
        if(res.ok) {
          fetchSchedules(); // refresh to sync with DB
        }
      } catch (err) {
        console.error("Backend offline, cancellation applied locally.", err);
      }
    }

    // Reschedule Action
    const rescheduleModal = document.getElementById('rescheduleModal');
    
    function openReschedule(id) {
      const sch = allSchedules.find(s => s.schedule_id === id);
      if(!sch) return;
      document.getElementById('rescheduleId').value = id;
      document.getElementById('rescheduleDate').value = sch.appointment_date;
      document.getElementById('rescheduleTime').value = sch.appointment_time;
      drawerOverlay.classList.add('active');
      rescheduleModal.classList.add('active');
    }
    
    function closeRescheduleModal() {
      drawerOverlay.classList.remove('active');
      rescheduleModal.classList.remove('active');
    }

    async function submitReschedule() {
      const id = document.getElementById('rescheduleId').value;
      const newDate = document.getElementById('rescheduleDate').value;
      const newTime = document.getElementById('rescheduleTime').value;
      
      if(!newDate || !newTime) return alert("Please enter both date and time");

      // Optimistic UI Update
      const idx = allSchedules.findIndex(s => s.schedule_id === id);
      if (idx > -1) {
        allSchedules[idx].appointment_date = newDate;
        allSchedules[idx].appointment_time = newTime;
        allSchedules[idx].status = 'Upcoming';
      }
      renderTable();
      closeRescheduleModal();

      try {
        const res = await fetch(`http://127.0.0.1:5002/api/schedule/${id}/reschedule`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ appointment_date: newDate, appointment_time: newTime })
        });
        if(res.ok) {
          fetchSchedules();
        }
      } catch (err) {
        console.error("Backend offline, reschedule applied locally.", err);
      }
    }

    // Initial Load
    fetchSchedules();

  </script>
</body>
</html>
