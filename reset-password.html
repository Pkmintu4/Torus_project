<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlebC - Update Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --text-white: #FFFFFF;
            --text-muted: #94A3B8;
            --purple-neon: #A855F7;
            --purple-gradient-start: #7C3AED;
            --purple-gradient-end: #9333EA;
            --cyan-neon: #22D3EE;
            --card-bg: rgba(15, 23, 42, 0.6);
            --card-border: rgba(255, 255, 255, 0.08);
            --input-bg: rgba(15, 23, 42, 0.8);
            --input-border: rgba(255, 255, 255, 0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
       html, body {
    width: 100%;
    height: 100%; /* important */
}

body {
    font-family: 'Inter', sans-serif;
    background-color: #050816;
    background-image: radial-gradient(circle at top, #1a0033 0%, #050816 60%, #02030a 100%);
    background-size: cover;
    background-attachment: fixed;
    color: var(--text-white);

    display: flex;
    justify-content: center;
    align-items: center; /* ✅ PERFECT CENTER */

    min-height: 100vh; /* ✅ full screen */
    padding: 1.25em;
    position: relative;
}

        body::before {
            content: '';
            position: absolute;
            top: -9.375em;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 75em;
            height: 37.5em;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.15) 0%, transparent 70%);
            filter: blur(3.75em);
            z-index: -1;
            pointer-events: none;
        }

        .container {
    width: 100%;
    max-width: 35em; /* 🔥 balanced increase */
    padding: 1.25em;
    display: flex;
    flex-direction: column;
    align-items: center;
}

        .header { text-align: center; margin-bottom: 2em; gap: 0.5em; display: flex; flex-direction: column; }
      .main-title {
    font-size: 2.375em; /* 🔥 little bigger */
    font-weight: 700;
}
        .subtitle { font-size: 0.9375em; color: var(--text-muted); }
.card {
    width: 100%;
    padding: 2.75em; /* 🔥 bigger */
    border-radius: 1.125em;
    backdrop-filter: blur(0.625em);
    box-shadow: 0 0.625em 2.5em rgba(0, 0, 0, 0.4);
}

        .form-group { display: flex; flex-direction: column; gap: 0.5em; margin-bottom: 1em; }
        .form-group label { font-size: 0.8125em; font-weight: 500; color: var(--text-muted); }

        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper .input-icon { position: absolute; left: 0.875em; width: 1.125em; height: 1.125em; fill: none; stroke: var(--text-muted); stroke-width: 2; pointer-events: none; }
        .form-control { width: 100%; background: var(--input-bg); border: 0.0625em solid var(--input-border); border-radius: 0.625em; padding: 0.75em 0.875em 0.75em 2.625em; font-family: 'Inter'; font-size: 0.9375em; color: var(--text-white); outline: none; transition: all 0.3s ease; }
        .form-control:focus { border-color: var(--purple-neon); box-shadow: 0 0 0 0.125em rgba(168, 85, 247, 0.2); }
        .password-input { padding-right: 3.125em; }
        .eye-toggle {
            position: absolute;
            right: 0.9375em;
            top: 50%;
            transform: translateY(-50%);
            width: 1.375em;
            height: 1.375em;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }
        .eye-toggle:hover { color: var(--text-white); }
        .eye-toggle:focus-visible {
            outline: 0.125em solid rgba(168, 85, 247, 0.45);
            outline-offset: 0.125em;
            border-radius: 0.25em;
        }
        .eye-toggle svg {
            width: 1.25em;
            height: 1.25em;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            pointer-events: none;
        }
        
        .btn { width: 100%; padding: 0.875em; border: none; border-radius: 0.625em; font-size: 0.9375em; font-weight: 600; color: white; cursor: pointer; transition: all 0.3s ease; display: flex; justify-content: center; margin-top: 0.625em; }
        .btn-primary { background: linear-gradient(90deg, var(--purple-gradient-start), var(--purple-gradient-end)); margin-bottom: 1em; box-shadow: 0 0.25em 0.9375em rgba(124, 58, 237, 0.3); }
        .btn-primary:hover:not(:disabled) { box-shadow: 0 0.375em 1.25em rgba(124, 58, 237, 0.5); filter: brightness(1.05); transform: translateY(-0.0625em); }
        .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; }
        .btn-secondary { background: rgba(255,255,255,0.03); border: 0.0625em solid var(--input-border); color: var(--text-muted); }
        .btn-secondary:hover { background: rgba(255,255,255,0.08); color: white; }
.form-control {
    padding: 0.9375em 0.9375em 0.9375em 2.875em;
    font-size: 1.0313em;
}

.form-control.password-input {
    padding: 0.9375em 3.125em 0.9375em 2.875em;
}

.btn {
    padding: 1.0625em;
    font-size: 1.0313em;
    border-radius: 0.75em;
}
        .alert {
            padding: 0.75em;
            border-radius: 0.5em;
            font-size: 0.8125em;
            text-align: center;
            display: none;
            margin-bottom: 1.25em;
        }
        .alert-error { color: #EF4444; background: rgba(239, 68, 68, 0.1); border: 0.0625em solid rgba(239, 68, 68, 0.2); }
        .alert-success { color: #10B981; background: rgba(16, 185, 129, 0.1); border: 0.0625em solid rgba(16, 185, 129, 0.2); }
    </style>
    <script src="config.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="main-title">Update Password</h1>
            <p class="subtitle">Assign a new password securely</p>
        </div>

        <div class="card">
            <div id="alertBox" class="alert"></div>

            <form id="resetForm">
                <div class="form-group">
                    <label>New Password</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        <input type="password" class="form-control password-input" id="pwd1" placeholder="••••••••" required minlength="6">
                        <button type="button" class="eye-toggle" data-target="pwd1" aria-label="Show password" aria-pressed="false"></button>
                    </div>
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        <input type="password" class="form-control password-input" id="pwd2" placeholder="••••••••" required minlength="6">
                        <button type="button" class="eye-toggle" data-target="pwd2" aria-label="Show password" aria-pressed="false"></button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" id="submitBtn">Update Password</button>
            </form>
            
            <button id="loginLink" class="btn btn-secondary" style="display:none;" onclick="window.location.href='doctor-portal.html'">Return to Login</button>
        </div>
    </div>

    <script>
        const API_BASE_URL = (window && window.__AUTH_API_BASE__) || (window && window.__API_BASE__) || 'http://127.0.0.1:5000';

        function getEyeSvg(isVisible) {
            const eyeBase = `
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                    ${isVisible ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8"></path><line x1="1" y1="1" x2="23" y2="23"></line>' : ''}
                </svg>
            `;
            return eyeBase;
        }

        function initializePasswordToggles() {
            const toggleButtons = document.querySelectorAll('.eye-toggle');

            toggleButtons.forEach((button) => {
                const targetId = button.getAttribute('data-target');
                const input = document.getElementById(targetId);

                if (!input) return;

                button.innerHTML = getEyeSvg(false);

                button.addEventListener('click', () => {
                    const showingPassword = input.type === 'text';
                    input.type = showingPassword ? 'password' : 'text';

                    const nowVisible = input.type === 'text';
                    button.innerHTML = getEyeSvg(nowVisible);
                    button.setAttribute('aria-pressed', String(nowVisible));
                    button.setAttribute('aria-label', nowVisible ? 'Hide password' : 'Show password');
                });
            });
        }

        initializePasswordToggles();

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const alertBox = document.getElementById('alertBox');
            const pwd1 = document.getElementById('pwd1').value;
            const pwd2 = document.getElementById('pwd2').value;

            alertBox.style.display = 'none';
            alertBox.className = 'alert';

            if (pwd1 !== pwd2) {
                alertBox.innerText = 'Passwords do not match';
                alertBox.classList.add('alert-error');
                alertBox.style.display = 'block';
                return;
            }

            // Get params from URL
            const urlParams = new URLSearchParams(window.location.search);
            const email = urlParams.get('email');
            const otp = urlParams.get('otp');

            if (!email || !otp) {
                alertBox.innerText = 'Email or OTP missing from URL. Go back to verification page.';
                alertBox.classList.add('alert-error');
                alertBox.style.display = 'block';
                return;
            }

            btn.innerHTML = 'Updating...';
            btn.disabled = true;

            try {
                const requestUrl = `${API_BASE_URL}/api/auth/reset-password`;
                console.log('[FRONTEND] Sending API request to:', requestUrl);

                const res = await fetch(requestUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp, newPassword: pwd1 })
                });
                console.log('[FRONTEND] API response status:', res.status);

                const data = await res.json();
                console.log('[FRONTEND] reset-password response:', data);
                
                if (res.ok) {
                    alertBox.innerText = data.message || data.msg || 'Password updated successfully';
                    alertBox.classList.add('alert-success');
                    alertBox.style.display = 'block';
                    document.getElementById('resetForm').style.display = 'none';
                    document.getElementById('loginLink').style.display = 'block';
                    setTimeout(() => {
                        window.location.href = 'doctor-portal.html';
                    }, 1000);
                } else {
                    alertBox.innerText = data.message || data.msg || 'Failed to update password';
                    alertBox.classList.add('alert-error');
                    alertBox.style.display = 'block';
                }
            } catch (err) {
                console.error('[FRONTEND] API connection error:', err);
                alertBox.innerText = 'Unable to connect. Please try again.';
                alertBox.classList.add('alert-error');
                alertBox.style.display = 'block';
            } finally {
                btn.innerHTML = 'Update Password';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
