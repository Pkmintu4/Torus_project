<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnostic Center – Update Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --text-white: #FFFFFF;
            --text-muted: #94A3B8;
            --cyan-neon: #22D3EE;
            --cyan-gradient-start: #06b6d4;
            --cyan-gradient-end: #0891b2;
            --card-bg: rgba(15, 23, 42, 0.6);
            --card-border: rgba(255, 255, 255, 0.08);
            --input-bg: rgba(15, 23, 42, 0.8);
            --input-border: rgba(255, 255, 255, 0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            min-height: 100vh;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #050816;
            background-image: radial-gradient(circle at top, #001a33 0%, #050816 60%, #02030a 100%);
            background-size: cover;
            background-attachment: fixed;
            color: var(--text-white);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1.25em;
            position: relative;
            -webkit-font-smoothing: antialiased;
        }

        body::before {
            content: '';
            position: absolute;
            top: -9.375em;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 75em;
            height: 37.5em;
            background: radial-gradient(circle, rgba(34, 211, 238, 0.15) 0%, transparent 70%);
            filter: blur(3.75em);
            z-index: -1;
            pointer-events: none;
        }

        .top-back-btn {
            position: fixed;
            top: 1.25em;
            right: 1.25em;
            background: rgba(255, 255, 255, 0.03);
            border: 0.0625em solid var(--input-border);
            color: var(--text-muted);
            border-radius: 999px;
            width: 7.5em;
            height: 3.59em;
            padding: 0;
            font-family: 'Inter', sans-serif;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            z-index: 30;
            box-shadow: 0 0 0.9em rgba(34, 211, 238, 0.12);
            transition: all 0.25s ease;
        }

        .top-back-btn:hover {
            color: var(--text-white);
            border-color: rgba(34, 211, 238, 0.45);
            background: rgba(34, 211, 238, 0.08);
            box-shadow: 0 0 1.05em rgba(34, 211, 238, 0.25);
            transform: translateY(-0.0625em);
        }

        .container {
            width: 100%;
            max-width: 35em;
            padding: 1.25em;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 2em;
            gap: 0.5em;
            display: flex;
            flex-direction: column;
        }

        .main-title { font-size: 2.375em; font-weight: 700; color: #ffffff; }
        .subtitle { font-size: 0.9375em; color: var(--text-muted); }

        .card {
            width: 100%;
            padding: 2.75em;
            border-radius: 1.125em;
            background: var(--card-bg);
            border: 0.0625em solid var(--card-border);
            backdrop-filter: blur(0.625em);
            box-shadow: 0 0.625em 2.5em rgba(0, 0, 0, 0.4);
        }

        .form-group { display: flex; flex-direction: column; gap: 0.5em; margin-bottom: 1em; }
        .form-group label { font-size: 0.8125em; font-weight: 500; color: var(--text-muted); }

        .input-wrapper { position: relative; display: flex; align-items: center; }

        .input-wrapper .input-icon {
            position: absolute;
            left: 0.875em;
            width: 1.125em;
            height: 1.125em;
            fill: none;
            stroke: var(--text-muted);
            stroke-width: 2;
            pointer-events: none;
        }

        .form-control {
            width: 100%;
            background: var(--input-bg);
            border: 0.0625em solid var(--input-border);
            border-radius: 0.625em;
            padding: 0.9375em 3.125em 0.9375em 2.875em;
            font-family: 'Inter', sans-serif;
            font-size: 1.0313em;
            color: var(--text-white);
            outline: none;
            transition: all 0.3s ease;
        }

        .form-control::placeholder { color: #475569; }

        .form-control:focus {
            border-color: var(--cyan-neon);
            box-shadow: 0 0 0 0.125em rgba(34, 211, 238, 0.2);
        }

        .eye-toggle {
            position: absolute;
            right: 0.9375em;
            top: 50%;
            transform: translateY(-50%);
            width: 1.375em;
            height: 1.375em;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .eye-toggle:hover { color: var(--text-white); }

        .eye-toggle svg {
            width: 1.25em;
            height: 1.25em;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            pointer-events: none;
        }

        .btn {
            width: 100%;
            padding: 1.0625em;
            border: none;
            border-radius: 0.75em;
            font-family: 'Inter', sans-serif;
            font-size: 1.0313em;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 0.625em;
        }

        .btn-primary {
            background: linear-gradient(90deg, var(--cyan-gradient-start), var(--cyan-gradient-end));
            margin-bottom: 1em;
            box-shadow: 0 0.25em 0.9375em rgba(6, 182, 212, 0.3);
        }

        .btn-primary:hover:not(:disabled) {
            box-shadow: 0 0.375em 1.25em rgba(6, 182, 212, 0.55);
            filter: brightness(1.07);
            transform: translateY(-0.0625em);
        }

        .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.03);
            border: 0.0625em solid var(--input-border);
            color: var(--text-muted);
        }

        .btn-secondary:hover { background: rgba(255, 255, 255, 0.08); color: white; }

        .alert {
            padding: 0.75em;
            border-radius: 0.5em;
            font-size: 0.8125em;
            text-align: center;
            display: none;
            margin-bottom: 1.25em;
        }

        .alert-error { color: #EF4444; background: rgba(239, 68, 68, 0.1); border: 0.0625em solid rgba(239, 68, 68, 0.2); }
        .alert-success { color: #10B981; background: rgba(16, 185, 129, 0.1); border: 0.0625em solid rgba(16, 185, 129, 0.2); }

        @media (max-width: 37.5em) {
            .card { padding: 1.75em 1.25em; }
            .main-title { font-size: 1.875em; }
            .top-back-btn { top: 1em; right: 1em; width: 5em; height: 2.2em; font-size: 0.95em; }
        }
    </style>
    <script src="config.js"></script>
</head>
<body>
    <button type="button" class="top-back-btn" id="topBackBtn" aria-label="Go back">Back</button>

    <div class="container">
        <div class="header">
            <h1 class="main-title">Update Password</h1>
            <p class="subtitle">Assign a new password securely</p>
        </div>

        <div class="card">
            <div id="alertBox" class="alert"></div>

            <form id="resetForm">
                <div class="form-group">
                    <label>New Password</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        <input type="password" class="form-control" id="pwd1" placeholder="••••••••" required minlength="6">
                        <button type="button" class="eye-toggle" data-target="pwd1" aria-label="Show password" aria-pressed="false"></button>
                    </div>
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        <input type="password" class="form-control" id="pwd2" placeholder="••••••••" required minlength="6">
                        <button type="button" class="eye-toggle" data-target="pwd2" aria-label="Show password" aria-pressed="false"></button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" id="submitBtn">Update Password</button>
            </form>

            <button id="loginLink" class="btn btn-secondary" style="display:none;" onclick="window.location.href='diagnostic-center.html'">Return to Login</button>
        </div>
    </div>

    <script>
        const API_BASE_URL = (window && window.__AUTH_API_BASE__) || (window && window.__API_BASE__) || 'http://127.0.0.1:5000';

        document.getElementById('topBackBtn').addEventListener('click', () => {
            window.location.href = 'diagnostic-center.html';
        });

        function getEyeSvg(isVisible) {
            return `<svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
                ${isVisible ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8"></path><line x1="1" y1="1" x2="23" y2="23"></line>' : ''}
            </svg>`;
        }

        document.querySelectorAll('.eye-toggle').forEach((button) => {
            const targetId = button.getAttribute('data-target');
            const input = document.getElementById(targetId);
            button.innerHTML = getEyeSvg(false);

            button.addEventListener('click', () => {
                const showingPassword = input.type === 'text';
                input.type = showingPassword ? 'password' : 'text';
                const nowVisible = input.type === 'text';
                button.innerHTML = getEyeSvg(nowVisible);
                button.setAttribute('aria-pressed', String(nowVisible));
                button.setAttribute('aria-label', nowVisible ? 'Hide password' : 'Show password');
            });
        });

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const alertBox = document.getElementById('alertBox');
            const pwd1 = document.getElementById('pwd1').value;
            const pwd2 = document.getElementById('pwd2').value;

            alertBox.style.display = 'none';
            alertBox.className = 'alert';

            if (pwd1 !== pwd2) {
                alertBox.innerText = 'Passwords do not match';
                alertBox.classList.add('alert-error');
                alertBox.style.display = 'block';
                return;
            }

            const urlParams = new URLSearchParams(window.location.search);
            const email = urlParams.get('email');
            const otp = urlParams.get('otp');

            if (!email || !otp) {
                alertBox.innerText = 'Email or OTP missing. Please restart the password reset flow.';
                alertBox.classList.add('alert-error');
                alertBox.style.display = 'block';
                return;
            }

            btn.innerHTML = 'Updating...';
            btn.disabled = true;

            try {
                const res = await fetch(`${API_BASE_URL}/api/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp, newPassword: pwd1 })
                });

                const data = await res.json();

                if (res.ok) {
                    alertBox.innerText = data.message || data.msg || 'Password updated successfully!';
                    alertBox.classList.add('alert-success');
                    alertBox.style.display = 'block';
                    document.getElementById('resetForm').style.display = 'none';
                    document.getElementById('loginLink').style.display = 'block';
                    setTimeout(() => {
                        window.location.href = 'diagnostic-center.html';
                    }, 1500);
                } else {
                    alertBox.innerText = data.message || data.msg || 'Failed to update password';
                    alertBox.classList.add('alert-error');
                    alertBox.style.display = 'block';
                }
            } catch (err) {
                if (err instanceof TypeError && err.message.toLowerCase().includes('fetch')) {
                    alertBox.innerText = 'Unable to connect. Please check your connection or contact support.';
                } else {
                    alertBox.innerText = 'Something went wrong. Please try again.';
                }
                alertBox.classList.add('alert-error');
                alertBox.style.display = 'block';
            } finally {
                btn.innerHTML = 'Update Password';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
