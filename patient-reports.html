<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TORUS - Patient Reports</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="styles.css" />
  <script src="config.js"></script>
  <style>
    body.reports-page {
      background-color: #02040a !important;
      background-image: none !important;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3em 1.5em;
      font-family: 'Inter', sans-serif;
      color: #fff;
    }

    .reports-page::before,
    .reports-page::after {
      content: '';
      position: fixed;
      width: 800px;
      height: 800px;
      border-radius: 50%;
      filter: blur(150px);
      z-index: -1;
      pointer-events: none;
      opacity: 0.35;
    }

    .reports-page::before {
      top: -20%;
      left: 10%;
      background: radial-gradient(circle, #A855F7 0%, transparent 60%);
    }

    .reports-page::after {
      bottom: -20%;
      right: 10%;
      background: radial-gradient(circle, #00E5FF 0%, transparent 60%);
    }

    .records-container {
      width: 95%;
      max-width: 1400px;
      background: linear-gradient(145deg, rgba(12, 18, 33, 0.7), rgba(5, 8, 15, 0.9));
      backdrop-filter: blur(30px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 1.5em;
      padding: 2.5em 3.5em;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6), inset 0 0 30px rgba(255, 255, 255, 0.03);
    }

    .reg-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2.5em;
      padding-bottom: 1.5em;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .reg-title {
      display: flex;
      align-items: center;
      gap: 1em;
    }

    .reg-title h2 {
      margin: 0;
      font-size: 1.8em;
      font-weight: 700;
      background: linear-gradient(90deg, #A855F7, #00C8FF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 20px rgba(168, 85, 247, 0.4);
    }

    .back-btn {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(0, 229, 255, 0.4);
      box-shadow: 0 0 15px rgba(0, 229, 255, 0.15);
      color: #fff;
      padding: 0.6em 1.2em;
      border-radius: 0.6em;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.6em;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .back-btn:hover {
      background: rgba(0, 229, 255, 0.15);
      border-color: #00E5FF;
      box-shadow: 0 0 25px rgba(0, 229, 255, 0.4);
      transform: translateY(-2px);
    }

    .controls-row {
      display: flex;
      gap: 1.5em;
      margin-bottom: 2em;
      align-items: center;
      flex-wrap: wrap;
    }

    .search-box {
      flex: 1;
      min-width: 300px;
      position: relative;
    }

    .search-box i {
      position: absolute;
      left: 1.2em;
      top: 50%;
      transform: translateY(-50%);
      color: #A855F7;
      width: 20px;
      height: 20px;
    }

    .search-box input {
      width: 100%;
      background: rgba(2, 4, 10, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 0.8em;
      padding: 1em 1em 1em 3em;
      color: #fff;
      font-size: 1.05em;
      transition: all 0.3s ease;
      box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.4);
    }

    .search-box input:focus {
      outline: none;
      border-color: #A855F7;
      background: rgba(168, 85, 247, 0.05);
      box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.4), 0 0 20px rgba(168, 85, 247, 0.3);
    }

    .filter-group {
      display: flex;
      gap: 1em;
    }

    select.filter-select {
      background: rgba(2, 4, 10, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 0.8em;
      padding: 1em 3em 1em 1.2em;
      color: #fff;
      font-size: 1em;
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23A855F7' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 1.2em center;
      background-size: 1.4em;
      cursor: pointer;
      box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.4);
    }
    select.filter-select option {
      background: #0b1121;
    }

    .records-table-container {
      overflow-x: auto;
      border-radius: 1em;
      border: 1px solid rgba(255, 255, 255, 0.05);
      background: rgba(2, 4, 10, 0.3);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    th {
      background: rgba(255, 255, 255, 0.03);
      padding: 1.2em 1em;
      color: #e2e8f0;
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.85em;
      letter-spacing: 0.05em;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    td {
      padding: 1.2em 1em;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      color: #cbd5e1;
      font-size: 0.95em;
    }

    tr:hover td {
      background: rgba(168, 85, 247, 0.05);
      color: #fff;
    }

    .status-badge {
      background: rgba(168, 85, 247, 0.1);
      color: #A855F7;
      padding: 0.4em 0.8em;
      border-radius: 2em;
      font-size: 0.85em;
      font-weight: 600;
      border: 1px solid rgba(168, 85, 247, 0.2);
    }
    
    .status-badge.sent {
      background: rgba(0, 255, 153, 0.1);
      color: #00FF99;
      border: 1px solid rgba(0, 255, 153, 0.2);
    }

    .action-btns {
      display: flex;
      gap: 0.8em;
    }

    .action-btn {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #94A3B8;
      border-radius: 0.4em;
      padding: 0.4em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .action-btn:hover {
      background: rgba(168, 85, 247, 0.1);
      color: #A855F7;
      border-color: #A855F7;
    }
    
    .action-btn svg {
      width: 18px;
      height: 18px;
    }
  </style>
</head>

<body class="dashboard-page reports-page">
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <aside class="sidebar" id="sidebar" aria-label="Dashboard navigation">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <div class="brand-logo-wrap">
          <img src="logo.png" alt="TORUS Logo" class="brand-logo" />
        </div>
        <div class="brand-copy">
          <strong>TORUS</strong>
          <span>Diagnostic Center</span>
        </div>
      </div>
      <button class="close-sidebar" id="closeSidebar" type="button" aria-label="Close sidebar">
        <i data-lucide="x"></i>
      </button>
    </div>

    <nav class="sidebar-nav">
      <button class="sidebar-link" type="button" onclick="window.location.href='diagnostic-dashboard.html'">
        <i data-lucide="layout-dashboard" class="link-icon"></i>
        <span>Diagnostic Dashboard</span>
      </button>
      <button class="sidebar-link" type="button" onclick="window.location.href='diagnostic-dashboard.html'">
        <i data-lucide="building" class="link-icon"></i>
        <span>Center Profile</span>
      </button>
      <button class="sidebar-link" type="button" onclick="window.location.href='diagnostic-dashboard.html'">
        <i data-lucide="activity" class="link-icon"></i>
        <span>Activity Log</span>
      </button>
      <button class="sidebar-link" type="button" onclick="window.location.href='diagnostic-dashboard.html'">
        <i data-lucide="bar-chart-3" class="link-icon"></i>
        <span>Insights</span>
      </button>
      <button class="sidebar-link active" type="button" onclick="window.location.href='patient-reports.html'">
        <i data-lucide="file-text" class="link-icon"></i>
        <span>Patient Reports</span>
      </button>
      <button class="sidebar-link" type="button" onclick="window.location.href='patient-records.html'">
        <i data-lucide="users" class="link-icon"></i>
        <span>Patient Records</span>
      </button>
      <button class="sidebar-link logout" type="button" onclick="window.location.href='diagnostic-center.html'">
        <i data-lucide="log-out" class="link-icon"></i>
        <span>Logout</span>
      </button>
    </nav>
    <div class="sidebar-spacer"></div>

    <div class="sidebar-footer">
      <div class="user-summary">
        <strong data-user-name>Dr. User</strong>
        <span data-user-email>user@example.com</span>
        <span>Role: <span data-user-role>diagnostic center</span></span>
      </div>
    </div>
  </aside>

  <div class="dashboard-shell">
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-icon-btn" id="menuToggle" type="button" aria-label="Open sidebar">
          <i data-lucide="menu"></i>
        </button>
        <div class="brand-inline">
          <div class="brand-logo-wrap">
            <img src="logo.png" alt="TORUS Logo" class="brand-logo" />
          </div>
          <div class="brand-wordmark">TORUS</div>
        </div>
      </div>

      <div class="topbar-right">
        <div class="haptic-status-stack">
          <div class="haptic-chip haptic-chip--connecting" id="hapticStatusChip" role="status" aria-live="polite"
            aria-atomic="true" data-haptic-status="connecting">
            <span class="haptic-chip-alert" aria-hidden="true">⚠</span>
            <span class="haptic-chip-label">Haptic Pad</span>
            <span class="haptic-chip-separator" aria-hidden="true">•</span>
            <span class="haptic-chip-state" id="hapticChipStateText">Connecting...</span>
            <span class="haptic-chip-indicator" id="hapticChipIndicator" aria-hidden="true"></span>
          </div>
        </div>

        <button class="icon-btn" type="button" aria-label="Notifications">
          <i data-lucide="bell"></i>
        </button>
        <div class="avatar-chip" data-user-initials>DA</div>
      </div>
    </header>

    <main class="dashboard-content" style="padding: 2em; overflow-y: auto;">
      <section class="section-view active" style="display:block;">
        <div class="records-container" style="margin: 0 auto;">
          <div class="reg-header">
            <div class="reg-title">
              <i data-lucide="file-text" style="color:#A855F7"></i>
              <h2>Patient Reports</h2>
            </div>
          </div>

    <div class="controls-row">
      <div class="search-box">
        <i data-lucide="search"></i>
        <input type="text" id="searchInput" placeholder="Search by Report ID, Patient Name, or Patient ID..." onkeyup="fetchReports()" />
      </div>
      <div class="filter-group">
        <select id="filterStatus" class="filter-select" onchange="fetchReports()">
          <option value="">All Statuses</option>
          <option value="Generated">Generated</option>
          <option value="Digitally Signed">Digitally Signed</option>
          <option value="Sent to Patient">Sent to Patient</option>
        </select>
      </div>
    </div>

    <div class="records-table-container">
      <table>
        <thead>
          <tr>
            <th>Report ID</th>
            <th>Patient Name</th>
            <th>Patient ID</th>
            <th>Scan Type</th>
            <th>Generated Date</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="reportsBody">
          <tr><td colspan="7" style="text-align:center; padding: 2em; color: #94A3B8;">Loading reports...</td></tr>
        </tbody>
      </table>
    </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    lucide.createIcons();
    
    let allReports = [];

    async function fetchReports() {
      try {
        const apiBase = (window && window.__API_BASE__) || 'http://127.0.0.1:5002';
        const response = await fetch(`${apiBase}/api/reports`);
        const resData = await response.json();
        
        if (response.ok && resData.data) {
          allReports = resData.data;
          renderTable();
        }
      } catch (err) {
        console.error(err);
        document.getElementById('reportsBody').innerHTML = '<tr><td colspan="7" style="text-align:center; padding: 2em; color: #ff4545;">Error fetching reports.</td></tr>';
      }
    }

    function renderTable() {
      const tbody = document.getElementById('reportsBody');
      const search = document.getElementById('searchInput').value.toLowerCase();
      const statusFilter = document.getElementById('filterStatus').value;
      
      let filtered = allReports.filter(r => {
        const matchSearch = !search || 
          (r.report_id && r.report_id.toLowerCase().includes(search)) || 
          (r.patient_name && r.patient_name.toLowerCase().includes(search)) || 
          (r.patient_id && r.patient_id.toLowerCase().includes(search));
          
        const matchStatus = !statusFilter || r.status === statusFilter;
        
        return matchSearch && matchStatus;
      });

      tbody.innerHTML = '';

      if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding: 2em; color: #94A3B8;">No reports found.</td></tr>';
        return;
      }

      filtered.forEach(r => {
        const tr = document.createElement('tr');
        
        let badgeClass = 'status-badge';
        if(r.status === 'Sent to Patient') badgeClass += ' sent';
        
        tr.innerHTML = `
          <td style="color:#A855F7; font-weight:600;">${r.report_id}</td>
          <td style="color:#fff; font-weight:500;">${r.patient_name}</td>
          <td>${r.patient_id}</td>
          <td>${r.scan_type}</td>
          <td>${r.generated_date}</td>
          <td><span class="${badgeClass}">${r.status}</span></td>
          <td>
            <div class="action-btns">
              <button class="action-btn" title="View Report"><i data-lucide="eye"></i></button>
              <button class="action-btn" title="Download PDF"><i data-lucide="download"></i></button>
              <button class="action-btn" title="Print Report"><i data-lucide="printer"></i></button>
            </div>
          </td>
        `;
        tbody.appendChild(tr);
      });
      lucide.createIcons();
    }

    window.addEventListener('DOMContentLoaded', () => {
      // Sidebar logic
      const menuToggle = document.getElementById('menuToggle');
      const closeSidebar = document.getElementById('closeSidebar');
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebarOverlay');

      menuToggle?.addEventListener('click', () => {
        sidebar?.classList.add('open');
        overlay?.classList.add('active');
        document.body.style.overflow = 'hidden';
      });

      const closeMenu = () => {
        sidebar?.classList.remove('open');
        overlay?.classList.remove('active');
        document.body.style.overflow = '';
      };

      closeSidebar?.addEventListener('click', closeMenu);
      overlay?.addEventListener('click', closeMenu);

      fetchReports();
    });
  </script>
</body>

</html>
