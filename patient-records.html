<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TORUS - Patient Records</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="styles.css" />
  <script src="config.js"></script>
  <style>
    body.records-page {
      background-color: #02040a !important;
      background-image: none !important;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3em 1.5em;
      font-family: 'Inter', sans-serif;
      color: #fff;
    }

    .records-page::before,
    .records-page::after {
      content: '';
      position: fixed;
      width: 800px;
      height: 800px;
      border-radius: 50%;
      filter: blur(150px);
      z-index: -1;
      pointer-events: none;
      opacity: 0.35;
    }

    .records-page::before {
      top: -20%;
      left: 10%;
      background: radial-gradient(circle, #00C8FF 0%, transparent 60%);
    }

    .records-page::after {
      bottom: -20%;
      right: 10%;
      background: radial-gradient(circle, #8A2EFF 0%, transparent 60%);
    }

    .records-container {
      width: 95%;
      max-width: 1400px;
      background: linear-gradient(145deg, rgba(12, 18, 33, 0.7), rgba(5, 8, 15, 0.9));
      backdrop-filter: blur(30px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 1.5em;
      padding: 2.5em 3.5em;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6), inset 0 0 30px rgba(255, 255, 255, 0.03);
    }

    .reg-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2.5em;
      padding-bottom: 1.5em;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .reg-title {
      display: flex;
      align-items: center;
      gap: 1em;
    }

    .reg-title h2 {
      margin: 0;
      font-size: 1.8em;
      font-weight: 700;
      background: linear-gradient(90deg, #00E5FF, #00C8FF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 20px rgba(0, 229, 255, 0.4);
    }

    .back-btn {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(0, 229, 255, 0.4);
      box-shadow: 0 0 15px rgba(0, 229, 255, 0.15);
      color: #fff;
      padding: 0.6em 1.2em;
      border-radius: 0.6em;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.6em;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .back-btn:hover {
      background: rgba(0, 229, 255, 0.15);
      border-color: #00E5FF;
      box-shadow: 0 0 25px rgba(0, 229, 255, 0.4);
      transform: translateY(-2px);
    }

    .controls-row {
      display: flex;
      gap: 1.5em;
      margin-bottom: 2em;
      align-items: center;
      flex-wrap: wrap;
    }

    .search-box {
      flex: 1;
      min-width: 300px;
      position: relative;
    }

    .search-box i {
      position: absolute;
      left: 1.2em;
      top: 50%;
      transform: translateY(-50%);
      color: #00E5FF;
      width: 20px;
      height: 20px;
    }

    .search-box input {
      width: 100%;
      background: rgba(2, 4, 10, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 0.8em;
      padding: 1em 1em 1em 3em;
      color: #fff;
      font-size: 1.05em;
      transition: all 0.3s ease;
      box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.4);
    }

    .search-box input:focus {
      outline: none;
      border-color: #00E5FF;
      background: rgba(0, 229, 255, 0.05);
      box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.4), 0 0 20px rgba(0, 229, 255, 0.3);
    }

    .filter-group {
      display: flex;
      gap: 1em;
    }

    select.filter-select {
      background: rgba(2, 4, 10, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 0.8em;
      padding: 1em 3em 1em 1.2em;
      color: #fff;
      font-size: 1em;
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2300E5FF' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 1.2em center;
      background-size: 1.4em;
      cursor: pointer;
      box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.4);
    }
    select.filter-select option {
      background: #0b1121;
    }

    .records-table-container {
      overflow-x: auto;
      border-radius: 1em;
      border: 1px solid rgba(255, 255, 255, 0.05);
      background: rgba(2, 4, 10, 0.3);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    th {
      background: rgba(255, 255, 255, 0.03);
      padding: 1.2em 1em;
      color: #e2e8f0;
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.85em;
      letter-spacing: 0.05em;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    td {
      padding: 1.2em 1em;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      color: #cbd5e1;
      font-size: 0.95em;
    }

    tr:hover td {
      background: rgba(0, 229, 255, 0.03);
      color: #fff;
    }

    .status-badge {
      background: rgba(0, 229, 255, 0.1);
      color: #00E5FF;
      padding: 0.4em 0.8em;
      border-radius: 2em;
      font-size: 0.85em;
      font-weight: 600;
      border: 1px solid rgba(0, 229, 255, 0.2);
    }

    .action-btns {
      display: flex;
      gap: 0.8em;
    }

    .action-btn {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #94A3B8;
      border-radius: 0.4em;
      padding: 0.4em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .action-btn:hover {
      background: rgba(0, 229, 255, 0.1);
      color: #00E5FF;
      border-color: #00E5FF;
    }
    
    .action-btn svg {
      width: 18px;
      height: 18px;
    }

    /* Patient Details Modal */
    .details-modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(15px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .details-modal-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .details-modal {
      background: linear-gradient(145deg, rgba(12, 18, 33, 0.95), rgba(5, 8, 15, 0.98));
      border: 1px solid rgba(0, 229, 255, 0.4);
      padding: 3em;
      border-radius: 2em;
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8), 0 0 80px rgba(0, 229, 255, 0.15);
      width: 95%;
      max-width: 1000px;
      max-height: 90vh;
      overflow-y: auto;
      transform: translateY(40px) scale(0.95);
      transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .timeline {
      position: relative;
      padding-left: 2em;
      margin-top: 1.5em;
    }
    
    .timeline::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 2px;
      background: rgba(255, 255, 255, 0.1);
    }
    
    .timeline-item {
      position: relative;
      margin-bottom: 1.5em;
    }
    
    .timeline-item::before {
      content: '';
      position: absolute;
      left: -2.35em;
      top: 0.3em;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #00E5FF;
      box-shadow: 0 0 10px #00E5FF;
    }
    
    .timeline-date {
      font-size: 0.85em;
      color: #94A3B8;
      margin-bottom: 0.2em;
    }
    
    .timeline-content {
      background: rgba(2, 4, 10, 0.4);
      border: 1px solid rgba(255,255,255,0.05);
      padding: 1em;
      border-radius: 0.8em;
    }
    
    .modal-section-title {
      font-size: 1.2em;
      color: #fff;
      margin-top: 2em;
      margin-bottom: 1em;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding-bottom: 0.5em;
    }

    .details-modal-overlay.active .details-modal {
      transform: translateY(0) scale(1);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2em;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding-bottom: 1em;
    }

    .modal-header h3 {
      margin: 0;
      font-size: 1.5em;
      color: #00E5FF;
    }

    .close-modal {
      background: transparent;
      border: none;
      color: #94A3B8;
      cursor: pointer;
    }

    .close-modal:hover {
      color: #ff4545;
    }

    .details-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5em;
    }

    .detail-item {
      background: rgba(2, 4, 10, 0.4);
      border: 1px solid rgba(255,255,255,0.05);
      padding: 1em;
      border-radius: 0.8em;
    }

    .detail-item label {
      display: block;
      font-size: 0.8em;
      color: #94A3B8;
      text-transform: uppercase;
      margin-bottom: 0.4em;
    }

    .detail-item div {
      font-size: 1.1em;
      color: #fff;
      font-weight: 500;
    }

  </style>
</head>

<body class="dashboard-page records-page">
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <aside class="sidebar" id="sidebar" aria-label="Dashboard navigation">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <div class="brand-logo-wrap">
          <img src="logo.png" alt="TORUS Logo" class="brand-logo" />
        </div>
        <div class="brand-copy">
          <strong>TORUS</strong>
          <span>Diagnostic Center</span>
        </div>
      </div>
      <button class="close-sidebar" id="closeSidebar" type="button" aria-label="Close sidebar">
        <i data-lucide="x"></i>
      </button>
    </div>

    <nav class="sidebar-nav">
      <button class="sidebar-link" type="button" onclick="window.location.href='diagnostic-dashboard.html'">
        <i data-lucide="layout-dashboard" class="link-icon"></i>
        <span>Diagnostic Dashboard</span>
      </button>
      <button class="sidebar-link" type="button" onclick="window.location.href='diagnostic-dashboard.html'">
        <i data-lucide="building" class="link-icon"></i>
        <span>Center Profile</span>
      </button>
      <button class="sidebar-link" type="button" onclick="window.location.href='diagnostic-dashboard.html'">
        <i data-lucide="activity" class="link-icon"></i>
        <span>Activity Log</span>
      </button>
      <button class="sidebar-link" type="button" onclick="window.location.href='diagnostic-dashboard.html'">
        <i data-lucide="bar-chart-3" class="link-icon"></i>
        <span>Insights</span>
      </button>
      <button class="sidebar-link" type="button" onclick="window.location.href='patient-reports.html'">
        <i data-lucide="file-text" class="link-icon"></i>
        <span>Patient Reports</span>
      </button>
      <button class="sidebar-link active" type="button" onclick="window.location.href='patient-records.html'">
        <i data-lucide="users" class="link-icon"></i>
        <span>Patient Records</span>
      </button>
      <button class="sidebar-link logout" type="button" onclick="window.location.href='diagnostic-center.html'">
        <i data-lucide="log-out" class="link-icon"></i>
        <span>Logout</span>
      </button>
    </nav>
    <div class="sidebar-spacer"></div>

    <div class="sidebar-footer">
      <div class="user-summary">
        <strong data-user-name>Dr. User</strong>
        <span data-user-email>user@example.com</span>
        <span>Role: <span data-user-role>diagnostic center</span></span>
      </div>
    </div>
  </aside>

  <div class="dashboard-shell">
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-icon-btn" id="menuToggle" type="button" aria-label="Open sidebar">
          <i data-lucide="menu"></i>
        </button>
        <div class="brand-inline">
          <div class="brand-logo-wrap">
            <img src="logo.png" alt="TORUS Logo" class="brand-logo" />
          </div>
          <div class="brand-wordmark">TORUS</div>
        </div>
      </div>

      <div class="topbar-right">
        <div class="haptic-status-stack">
          <div class="haptic-chip haptic-chip--connecting" id="hapticStatusChip" role="status" aria-live="polite"
            aria-atomic="true" data-haptic-status="connecting">
            <span class="haptic-chip-alert" aria-hidden="true">⚠</span>
            <span class="haptic-chip-label">Haptic Pad</span>
            <span class="haptic-chip-separator" aria-hidden="true">•</span>
            <span class="haptic-chip-state" id="hapticChipStateText">Connecting...</span>
            <span class="haptic-chip-indicator" id="hapticChipIndicator" aria-hidden="true"></span>
          </div>
        </div>

        <button class="icon-btn" type="button" aria-label="Notifications">
          <i data-lucide="bell"></i>
        </button>
        <div class="avatar-chip" data-user-initials>DA</div>
      </div>
    </header>

    <main class="dashboard-content" style="padding: 2em; overflow-y: auto;">
      <section class="section-view active" style="display:block;">
        <div class="records-container" style="margin: 0 auto;">
          <div class="reg-header">
            <div class="reg-title">
              <i data-lucide="users"></i>
              <h2>Patient Records</h2>
            </div>
          </div>

    <div class="controls-row">
      <div class="search-box">
        <i data-lucide="search"></i>
        <input type="text" id="searchInput" placeholder="Search by ID, Name, or Mobile..." onkeyup="fetchPatients()" />
      </div>
      <div class="filter-group">
        <select id="filterScanType" class="filter-select" onchange="fetchPatients()">
          <option value="">All Scan Types</option>
          <option value="Abdominal Ultrasound">Abdominal Ultrasound</option>
          <option value="Pelvic Ultrasound">Pelvic Ultrasound</option>
          <option value="Cardiac Ultrasound">Cardiac Ultrasound</option>
          <option value="Thyroid Scan">Thyroid Scan</option>
          <option value="Vascular Scan">Vascular Scan</option>
          <option value="Obstetric Scan">Obstetric Scan</option>
        </select>
        <select id="filterSort" class="filter-select" onchange="fetchPatients()">
          <option value="DESC">Latest First</option>
          <option value="ASC">Oldest First</option>
        </select>
      </div>
    </div>

    <div class="records-table-container">
      <table>
        <thead>
          <tr>
            <th>Patient ID</th>
            <th>Full Name</th>
            <th>Age</th>
            <th>Gender</th>
            <th>Mobile Number</th>
            <th>Scan Type</th>
            <th>Appt Date</th>
            <th>Reg Date</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="recordsBody">
          <tr><td colspan="10" style="text-align:center;">Loading...</td></tr>
        </tbody>
      </table>
    </div>
      </section>
    </main>
  </div>

  <div class="details-modal-overlay" id="detailsModal">
    <div class="details-modal">
      <div class="modal-header">
        <h3 id="modalPatientId">TORUS-0000</h3>
        <button class="close-modal" onclick="closeModal()"><i data-lucide="x"></i></button>
      </div>
      <div class="details-grid" id="modalGrid">
        <!-- Content injected dynamically -->
      </div>
    </div>
  </div>

  <script>
    lucide.createIcons();
    
    let allPatients = [];

    async function fetchPatients() {
      const search = document.getElementById('searchInput').value;
      const apiBase = (window && window.__API_BASE__) || 'http://127.0.0.1:5002';
      const url = `${apiBase}/api/patients?search=${encodeURIComponent(search)}`;
      
      try {
        const response = await fetch(url);
        const resData = await response.json();
        
        if (response.ok && resData.data) {
          allPatients = resData.data;
          renderTable();
        }
      } catch (err) {
        console.error(err);
      }
    }

    function renderTable() {
      const tbody = document.getElementById('recordsBody');
      const sortOrder = document.getElementById('filterSort').value;
      const scanType = document.getElementById('filterScanType').value;
      
      let filtered = [...allPatients];
      
      if (scanType) {
        filtered = filtered.filter(p => p.scan_type === scanType);
      }
      
      if (sortOrder === 'ASC') {
        filtered.reverse(); // Default is DESC from the API
      }

      tbody.innerHTML = '';

      if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="10" style="text-align:center; padding: 2em; color: #94A3B8;">No patient records found.</td></tr>';
        return;
      }

      filtered.forEach(p => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td style="color:#00E5FF; font-weight:600;">${p.patient_id}</td>
          <td style="color:#fff; font-weight:500;">${p.full_name}</td>
          <td>${p.age}</td>
          <td>${p.gender}</td>
          <td>${p.mobile_number}</td>
          <td>${p.scan_type}</td>
          <td>${p.appointment_date}</td>
          <td>${p.registration_date}</td>
          <td><span class="status-badge">${p.status}</span></td>
          <td>
            <div class="action-btns">
              <button class="action-btn" title="View Details" onclick="openDetails('${p.patient_id}')"><i data-lucide="eye"></i></button>
              <button class="action-btn" title="Edit Patient"><i data-lucide="edit-2"></i></button>
            </div>
          </td>
        `;
        tbody.appendChild(tr);
      });
      lucide.createIcons();
    }

    function openDetails(patientId) {
      const p = allPatients.find(x => x.patient_id === patientId);
      if (!p) return;

      document.getElementById('modalPatientId').textContent = `Patient Profile: ${p.patient_id}`;
      
      const grid = document.getElementById('modalGrid');
      grid.innerHTML = `
        <div style="grid-column: 1 / -1;">
          <h4 class="modal-section-title" style="margin-top:0;">Basic Information</h4>
        </div>
        <div class="detail-item"><label>Full Name</label><div>${p.full_name}</div></div>
        <div class="detail-item"><label>Mobile Number</label><div>${p.mobile_number}</div></div>
        <div class="detail-item"><label>Age</label><div>${p.age} Years</div></div>
        <div class="detail-item"><label>Gender</label><div>${p.gender}</div></div>
        <div class="detail-item"><label>Email Address</label><div>${p.email || 'N/A'}</div></div>
        <div class="detail-item"><label>Blood Group</label><div>${p.blood_group || 'N/A'}</div></div>
        
        <div style="grid-column: 1 / -1;">
          <h4 class="modal-section-title">Registration Details</h4>
        </div>
        <div class="detail-item"><label>Scan Type</label><div>${p.scan_type}</div></div>
        <div class="detail-item"><label>Appointment Date</label><div>${p.appointment_date}</div></div>
        <div class="detail-item"><label>Registration Date</label><div>${p.registration_date}</div></div>
        <div class="detail-item"><label>Registration Time</label><div>${p.registration_time}</div></div>
        <div class="detail-item"><label>Status</label><div><span class="status-badge" style="display:inline-block;">${p.status}</span></div></div>
        
        <div style="grid-column: 1 / -1;">
          <h4 class="modal-section-title">Scan History Timeline</h4>
          <div class="timeline">
            <div class="timeline-item">
              <div class="timeline-date">${p.registration_date} ${p.registration_time}</div>
              <div class="timeline-content">
                <div style="color: #00E5FF; font-weight: 600;">Patient Registered</div>
                <div style="color: #94A3B8; font-size: 0.9em; margin-top: 0.5em;">Registration completed at TORUS Diagnostics Elite.</div>
              </div>
            </div>
            <div class="timeline-item">
              <div class="timeline-date">Pending</div>
              <div class="timeline-content" style="opacity: 0.5;">
                <div style="color: #fff; font-weight: 600;">Scan Scheduled</div>
                <div style="color: #94A3B8; font-size: 0.9em; margin-top: 0.5em;">Awaiting scan completion.</div>
              </div>
            </div>
          </div>
        </div>
      `;

      document.getElementById('detailsModal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('detailsModal').classList.remove('active');
    }

    // Initialize
    window.addEventListener('DOMContentLoaded', () => {
      // Sidebar logic
      const menuToggle = document.getElementById('menuToggle');
      const closeSidebar = document.getElementById('closeSidebar');
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebarOverlay');

      menuToggle?.addEventListener('click', () => {
        sidebar?.classList.add('open');
        overlay?.classList.add('active');
        document.body.style.overflow = 'hidden';
      });

      const closeMenu = () => {
        sidebar?.classList.remove('open');
        overlay?.classList.remove('active');
        document.body.style.overflow = '';
      };

      closeSidebar?.addEventListener('click', closeMenu);
      overlay?.addEventListener('click', closeMenu);

      // Check if URL has ?search=
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.has('search')) {
        document.getElementById('searchInput').value = urlParams.get('search');
      }
      fetchPatients();
    });
  </script>
</body>

</html>
