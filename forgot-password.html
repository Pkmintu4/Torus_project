<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlebC - Forgot Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --text-white: #FFFFFF;
            --text-muted: #94A3B8;
            --purple-neon: #A855F7;
            --purple-gradient-start: #7C3AED;
            --purple-gradient-end: #9333EA;
            --card-bg: rgba(15, 23, 42, 0.6);
            --card-border: rgba(255, 255, 255, 0.08);
            --input-bg: rgba(15, 23, 42, 0.8);
            --input-border: rgba(255, 255, 255, 0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; min-height: 100%; }

        html, body {
    width: 100%;
    height: 100%; /* IMPORTANT */
}

body {
    font-family: 'Inter', sans-serif;
    background-color: #050816;
    background-image: radial-gradient(circle at top, #1a0033 0%, #050816 60%, #02030a 100%);
    background-size: cover;
    background-attachment: fixed;
    color: var(--text-white);

    display: flex;
    justify-content: center;
    align-items: center; /* PERFECT CENTER */

    min-height: 100vh; /* FULL SCREEN HEIGHT */

    position: relative;

/* 🔥 container bigger + balanced */
.container {
    width: 100%;
    max-width: 35em; /* INCREASED */

    display: flex;
    flex-direction: column;
    align-items: center;

/* 🔥 heading bigger */

    font-size: 2.25em; /* increased */

    background: var(--card-bg);
    border: 0.0625em solid var(--card-border);

/* 🔥 input bigger */

    padding: 0.9375em 0.9375em 0.9375em 2.875em;
    font-size: 1.0313em;

    padding: 1.0625em;
    font-size: 1.0313em;
    border-radius: 0.75em;
}
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050816;
            background-image: radial-gradient(circle at top, #1a0033 0%, #050816 60%, #02030a 100%);
            background-size: cover;
            background-attachment: fixed;
            color: var(--text-white);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: -9.375em;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 75em;
            height: 37.5em;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.15) 0%, transparent 70%);
            filter: blur(3.75em);
            z-index: -1;
            pointer-events: none;
        }

       
        .header { text-align: center; margin-bottom: 2em; gap: 0.5em; display: flex; flex-direction: column; }
        .main-title { font-size: 2em; font-weight: 700; color: #ffffff; }
        .subtitle { font-size: 0.9375em; color: var(--text-muted); }

        .form-group { display: flex; flex-direction: column; gap: 0.5em; margin-bottom: 1.5em; }
        .form-group label { font-size: 0.8125em; font-weight: 500; color: var(--text-muted); }

        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper svg { position: absolute; left: 0.875em; width: 1.125em; height: 1.125em; fill: none; stroke: var(--text-muted); stroke-width: 2; }
        .form-control { width: 100%; background: var(--input-bg); border: 0.0625em solid var(--input-border); border-radius: 0.625em; padding: 0.75em 0.875em 0.75em 2.625em; font-family: 'Inter'; font-size: 0.9375em; color: var(--text-white); outline: none; transition: all 0.3s ease; }
        .form-control:focus { border-color: var(--purple-neon); box-shadow: 0 0 0 0.125em rgba(168, 85, 247, 0.2); }
        
        .btn { width: 100%; padding: 0.875em; border: none; border-radius: 0.625em; font-size: 0.9375em; font-weight: 600; color: white; cursor: pointer; transition: all 0.3s ease; display: flex; justify-content: center;}
        .btn-primary { background: linear-gradient(90deg, var(--purple-gradient-start), var(--purple-gradient-end)); margin-bottom: 1em; box-shadow: 0 0.25em 0.9375em rgba(124, 58, 237, 0.3); }
        .btn-primary:hover:not(:disabled) { box-shadow: 0 0.375em 1.25em rgba(124, 58, 237, 0.5); filter: brightness(1.05); transform: translateY(-0.0625em); }
        .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; }
        .btn-secondary { background: rgba(255,255,255,0.03); border: 0.0625em solid var(--input-border); color: var(--text-muted); }
        .btn-secondary:hover { background: rgba(255,255,255,0.08); color: white; }

        .alert {
            padding: 0.75em;
            border-radius: 0.5em;
            font-size: 0.8125em;
            text-align: center;
            display: none;
            margin-bottom: 1.25em;
        }
        .alert-error { color: #EF4444; background: rgba(239, 68, 68, 0.1); border: 0.0625em solid rgba(239, 68, 68, 0.2); }
        .alert-success { color: #10B981; background: rgba(16, 185, 129, 0.1); border: 0.0625em solid rgba(16, 185, 129, 0.2); }
    </style>
    <script src="config.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="main-title">Reset Password</h1>
            <p class="subtitle">Enter your email to receive a 6-digit OTP</p>
        </div>

        <div class="card">
            <div id="alertBox" class="alert"></div>

            <form id="forgotForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                        <input type="email" class="form-control" id="email" placeholder="doctor@hospital.com" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" id="submitBtn">Send OTP</button>
                <button type="button" class="btn btn-secondary" onclick="window.location.href='doctor-portal.html'">Back to Login</button>
            </form>
        </div>
    </div>

    <script>
        const API_BASE_URL = (window && window.__AUTH_API_BASE__) || (window && window.__API_BASE__) || 'http://127.0.0.1:5000';

        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const alertBox = document.getElementById('alertBox');
            const email = document.getElementById('email').value;

            alertBox.style.display = 'none';
            alertBox.className = 'alert';
            btn.innerHTML = 'Sending...';
            btn.disabled = true;

            try {
                const requestUrl = `${API_BASE_URL}/api/auth/send-otp`;
                console.log('[FRONTEND] Sending API request to:', requestUrl);

                const res = await fetch(requestUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                console.log('[FRONTEND] API response status:', res.status);

                const data = await res.json();
                console.log('[FRONTEND] API response body:', data);
                
                if (res.ok && data.success === true && data.mailSent === true) {
                    alertBox.innerText = data.message || data.msg || 'OTP sent to your email';
                    alertBox.classList.remove('alert-error');
                    alertBox.classList.add('alert-success');
                    setTimeout(() => {
                        window.location.href = `verify-otp.html?email=${encodeURIComponent(email)}`;
                    }, 1000);
                } else {
                    const parts = [data.message || data.msg || 'Failed to process request'];
                    if (data.hint) {
                        parts.push(data.hint);
                    }
                    alertBox.innerText = parts.join(' | ');
                    alertBox.classList.remove('alert-success');
                    alertBox.classList.add('alert-error');
                }
                alertBox.style.display = 'block';
                
            } catch (err) {
                console.error('[FRONTEND] API connection error:', err);
                if (err.name === 'TypeError') {
                    alertBox.innerText = 'Unable to send OTP. Please try again.';
                } else {
                    alertBox.innerText = 'Something went wrong. Please contact support.';
                }
                alertBox.classList.remove('alert-success');
                alertBox.classList.add('alert-error');
                alertBox.style.display = 'block';
            } finally {
                btn.innerHTML = 'Send OTP';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
